spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_approval_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: zyb520wxy@
    driver-class-name: com.mysql.cj.jdbc.Driver
  flowable:
    database-schema-update: true

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.tmccloud.aiapproval.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

# OpenAI API 配置
langchain4j:
  open-ai:
    chat-model:
      # DeepSeek API 配置（兼容 OpenAI 格式）
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1  # 千问兼容OpenAI的接口地址
      api-key: ${DASHSCOPE_API_KEY}  # 从环境变量读取
      model-name: qwen3.5-flash
      temperature: 0.7
      max-tokens: 2000
      timeout: 60s
      log-requests: true
      log-responses: true
      # 启用 JSON 模式支持
      response-format: json_schema

    embedding-model:
      # 可选：如果需要使用 DeepSeek 的嵌入模型
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1  # 千问兼容OpenAI的接口地址
      api-key: ${DASHSCOPE_API_KEY}  # 从环境变量读取
      model-name: text-embedding-v1

# 自定义配置：知识库文档路径
app:
  knowledge-base-path: D:/knowledge-base  # 存放公司制度文档的目录
# 向量数据库配置
vector:
  store:
    table-name: embedding_store  # 向量存储表名
